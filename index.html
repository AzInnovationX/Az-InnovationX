    /* --- Welcome Modal: "Buen Fin" Theme --- */

    .welcome-modal-overlay {

      position: fixed;

      top: 0;

      left: 0;

      width: 100%;

      height: 100%;

      background: rgba(10, 10, 10, 0.7);

      backdrop-filter: blur(10px) saturate(120%);

      -webkit-backdrop-filter: blur(10px) saturate(120%);

      z-index: 10005;

      display: none;

      align-items: center;

      justify-content: center;

      animation: fadeIn-dm 0.6s cubic-bezier(0.25, 1, 0.5, 1);

    }



    .welcome-modal-content {

      font-family: 'Inter', sans-serif;

      background: linear-gradient(145deg, #1a1a1a, #2c1d3e);

      padding: 2.5rem 3.5rem;

      border-radius: 25px;

      text-align: center;

      border: 1px solid #FF6B35;

      position: relative;

      overflow: hidden;

      transform: scale(0.8);

      opacity: 0;

      animation: scaleIn-dm-bounce 0.6s 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, pulsating-glow-dm 4s 1s ease-in-out infinite;

    }



    .welcome-modal-content::before {

      content: '';

      position: absolute;

      top: -1px;

      left: 0;

      width: 100%;

      height: 20px;

      background-image:

        radial-gradient(circle at 10px -5px, transparent 12px, #FF6B35 13px, #FF6B35 13px, transparent 14px),

        radial-gradient(circle at 35px 15px, transparent 12px, #FFC107 13px, #FFC107 13px, transparent 14px),

        radial-gradient(circle at 60px -5px, transparent 12px, #7B2CBF 13px, #7B2CBF 13px, transparent 14px),

        radial-gradient(circle at 85px 15px, transparent 12px, #FF6B35 13px, #FF6B35 13px, transparent 14px);

      background-size: 100px 30px;

      background-repeat: repeat-x;

      opacity: 0.9;

    }



    .welcome-icon {

      display: flex;

      justify-content: center;

      gap: 1rem;

      font-size: 3.5rem;

      margin-bottom: 1rem;

      line-height: 1;

      animation: icon-pulse-dm 4s ease-in-out infinite;

    }

    

    .welcome-svg-icon {

      width: 48px;

      height: 48px;

      stroke: #FF6B35;

    }



    #welcome-greeting {

      font-size: 2.2rem;

      font-weight: 800;

      background: linear-gradient(45deg, #e0e0e0, #ffffff);

      -webkit-background-clip: text;

      -webkit-text-fill-color: transparent;

      background-clip: text;

      margin-bottom: 0.5rem;

      text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);

    }

    

    .welcome-modal-content p {

      color: #ffffff;

      opacity: 0.9;

      font-weight: 500;

    }

    

    .buen-fin-promo {

      color: #ffffff;

      font-weight: 800;

      font-size: 1.1rem;

      margin-bottom: 1rem;

      animation: pulse-promo-dm 2s infinite;

      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.7);

    }



    @keyframes pulse-promo-dm {

      0% {

        transform: scale(1);

        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.7);

      }

      50% {

        transform: scale(1.03);

        text-shadow: 0 4px 8px rgba(0, 0, 0, 0.9);

      }

      100% {

        transform: scale(1);

        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.7);

      }

    }



    @keyframes fadeIn-dm {

      from {

        opacity: 0;

        backdrop-filter: blur(0) saturate(100%);

      }



      to {

        opacity: 1;

        backdrop-filter: blur(10px) saturate(120%);

      }

    }



    @keyframes fadeOut {

      from {

        opacity: 1;

      }



      to {

        opacity: 0;

      }

    }



    @keyframes scaleIn-dm-bounce {

      0% {

        transform: scale(0.8);

        opacity: 0;

      }



      60% {

        transform: scale(1.05);

        opacity: 1;

      }



      80% {

        transform: scale(0.95);

      }



      100% {

        transform: scale(1);

        opacity: 1;

      }

    }



    @keyframes pulsating-glow-dm {

      0% {

        box-shadow: 0 0 25px rgba(255, 107, 53, 0.5), 0 0 50px rgba(93, 46, 140, 0.4), inset 0 0 15px rgba(255, 165, 0, 0.2);

      }

        box-shadow: 0 0 35px rgba(255, 107, 53, 0.8), 0 0 60px rgba(93, 46, 140, 0.6), inset 0 0 20px rgba(255, 165, 0, 0.4);

      }



      100% {

        box-shadow: 0 0 25px rgba(255, 107, 53, 0.5), 0 0 50px rgba(93, 46, 140, 0.4), inset 0 0 15px rgba(255, 165, 0, 0.2);

      }

    }

      }



      50% {

        transform: scale(1.1);

        filter: drop-shadow(0 0 18px rgba(255, 165, 0, 1));

      }

    }
